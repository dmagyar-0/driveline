name: Deploy (Cloudflare Pages)

# Builds the WASM bundle + production web app and publishes apps/web/dist to
# Cloudflare Pages. The wasm artefact is NOT committed (see CLAUDE.md), so this
# job regenerates it the same way ci.yml does before `pnpm build`.
#
# Pushes to main publish a PRODUCTION deploy. Manual runs (workflow_dispatch)
# from any branch publish a PREVIEW deploy at a per-branch URL — handy for
# eyeballing a change before it lands.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One deploy per ref at a time; cancel superseded runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Don't fail the whole run for forks/PRs that can't see the secrets; the
    # deploy step itself guards on the token being present.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pinned: unpinned `latest` broke 2026-06-10 (resolved to a wasm-pack
          # that can't parse workspace-inherited keys). Keep workflows in sync.
          version: v0.15.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `pnpm wasm:build && pnpm --filter web build`, so the
      # release-optimised wasm (wasm-opt -Oz) ends up in apps/web/dist.
      - name: Production build
        run: pnpm build

      # Idempotent: succeeds the first time, no-ops (|| true) once it exists.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages project create driveline \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy apps/web/dist \
            --project-name=driveline \
            --branch="${{ github.ref_name }}" \
            --commit-dirty=true
