name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Rust: portable data-core + wasm-bindings. Clippy is gated with -D warnings
  # so lint regressions fail the build.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Web: build the WASM bundle (artefact is NOT committed), then typecheck and
  # run the JS unit + Arrow contract tests.
  # ---------------------------------------------------------------------------
  web:
    name: Web (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pinned: unpinned `latest` broke 2026-06-10 (resolved to a wasm-pack
          # that can't parse workspace-inherited keys). Keep workflows in sync.
          version: v0.15.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # The wasm bundle in apps/web/src/wasm/ is generated, not committed, so it
      # must be built before tsc / Vite / vitest can resolve its imports.
      - name: Build WASM bundle
        run: pnpm wasm:build

      - name: Typecheck
        run: pnpm --filter web exec tsc --noEmit

      - name: Unit + Arrow contract tests
        run: pnpm --filter web test --run

  # ---------------------------------------------------------------------------
  # Size budget: production build, then enforce the first-load / wasm gzip
  # budgets from CLAUDE.md via scripts/check-bundle-size.mjs.
  # ---------------------------------------------------------------------------
  size-budget:
    name: Size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pinned: unpinned `latest` broke 2026-06-10 (resolved to a wasm-pack
          # that can't parse workspace-inherited keys). Keep workflows in sync.
          version: v0.15.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
            ${{ runner.os }}-cargo-

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `pnpm wasm:build && pnpm --filter web build`, so the
      # release-optimised wasm (wasm-opt -Oz) ends up in apps/web/dist.
      - name: Production build
        run: pnpm build

      - name: Check bundle size budget
        run: pnpm size:check

  # ---------------------------------------------------------------------------
  # Fixtures freshness. Gated as its own job so a missing-deps failure is
  # clearly attributable here and does not mask the core rust/web jobs.
  # ---------------------------------------------------------------------------
  fixtures-check:
    name: Fixtures freshness
    runs-on: ubuntu-latest
    # Informational, non-blocking. The committed fixtures are binary
    # artifacts produced by ffmpeg/libx264 + asammdf, whose byte output is
    # not guaranteed bit-identical across tool versions. We regenerate and
    # hash-check to surface genuine staleness, but a pure encoder/library
    # version drift must not block unrelated PRs — so the job is allowed to
    # fail. Run `make fixtures && make fixtures-check` locally to confirm a
    # real fixture change.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `make fixtures` only needs ffmpeg (generate.py shells out to it)
      # plus the Python generator deps — not the full setup-test-env.sh
      # bootstrap (which also pulls pnpm/wasm/playwright and isn't on PATH
      # in this minimal job).
      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      # pyarrow is pinned: the tabular Parquet fixtures embed the writer
      # version in their footer, so an unpinned bump would change their bytes
      # and trip the freshness check. Keep in sync with the version used to
      # regenerate test-fixtures/tabular/*.parquet.
      #
      # Pillow is required by generate_calib_scene.py, which renders the calib
      # scene PNGs that ffmpeg encodes into scene_cam_front.mp4. It's pinned
      # for the same reason: the rasterised pixels feed straight into the
      # hash-checked MP4, so an unpinned bump could alter those bytes.
      - name: Install fixture generator deps
        run: pip3 install numpy mcap asammdf pyarrow==24.0.0 pillow==12.2.0

      # Regenerate from scratch (produces the gitignored out.h264 the hash
      # check needs), then verify the committed out.h264 hash is fresh.
      - name: Regenerate and verify fixtures are fresh
        run: |
          make fixtures
          make fixtures-check

# -----------------------------------------------------------------------------
# NOTE: Playwright e2e (`pnpm e2e`) is intentionally NOT run in CI by default —
# it needs a 4K-capable headless browser with WebCodecs and large fixtures,
# which is slow and flaky for every push. Run it manually with `pnpm e2e`, or
# enable the optional job below behind a workflow_dispatch / label trigger.
